<script>
async function loadPositionData() {
    const res = await fetch("data.csv");
    const text = await res.text();

    // ✅ Proper CSV parsing (handles quotes)
    const rows = text.trim().split("\n").map(row => {
        const result = [];
        let current = '';
        let insideQuotes = false;

        for (let char of row) {
            if (char === '"') {
                insideQuotes = !insideQuotes;
            } else if (char === ',' && !insideQuotes) {
                result.push(current);
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current);
        return result;
    });

    const header = rows[0];

    const positionIndex = header.findIndex(h => h.trim().toLowerCase() === "position");
    const countIndex = header.findIndex(h => h.trim().toLowerCase() === "total");

    const container = document.getElementById("positionList");
    container.innerHTML = "";

    let total = 0;

    rows.slice(1).forEach(row => {
        const position = row[positionIndex]?.trim();
        const count = Number(row[countIndex]);

        // ✅ Skip invalid rows
        if (!position || position.toLowerCase().includes("grand total")) return;
        if (isNaN(count)) return;

        total += count;

        container.innerHTML += `
            <div class="flex justify-between bg-slate-50 p-2 rounded">
                <span>${position}</span>
                <span class="font-semibold">${count}</span>
            </div>
        `;
    });

    document.getElementById("totalTrained").textContent = total.toLocaleString();
}

loadPositionData();
setInterval(loadPositionData, 5000);
</script>
